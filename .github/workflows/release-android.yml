name: Release (Android)

# Protected `main` rejects direct pushes from Actions. We open a version-bump PR on
# substantive merges; merging that PR tags and publishes the APK.
on:
  push:
    branches: [main]
    paths-ignore:
      - "pubspec.yaml"
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-android-main
  cancel-in-progress: false

jobs:
  prepare_release_pr:
    name: Open release PR (version bump)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && !contains(github.event.head_commit.message, 'chore(release):')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR branch + bump type
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const { owner, repo } = context.repo;
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
            });

            const pr = (prs.data || []).find(p => p.merged_at) || (prs.data || [])[0];
            const headRef = pr?.head?.ref || '';

            const isMinor =
              headRef.startsWith('feat/') ||
              headRef.startsWith('feature/');
            const isPatch =
              headRef.startsWith('fix/') ||
              headRef.startsWith('bug/') ||
              headRef.startsWith('chore/');

            const bump = isMinor ? 'minor' : (isPatch ? 'patch' : 'patch');

            core.setOutput('pr_number', pr?.number?.toString() || '');
            core.setOutput('head_ref', headRef);
            core.setOutput('bump', bump);

      - name: Bump version in pubspec.yaml
        id: bump
        run: |
          set -euo pipefail
          OUT="$(python3 tool/bump_version.py --bump '${{ steps.pr.outputs.bump }}' --build-number '${{ github.run_number }}')"
          echo "$OUT"

          VERSION_NAME="$(echo "$OUT" | sed -n 's/^VERSION_NAME=//p')"
          VERSION_FULL="$(echo "$OUT" | sed -n 's/^VERSION_FULL=//p')"

          if [ -z "$VERSION_NAME" ] || [ -z "$VERSION_FULL" ]; then
            echo "Failed to parse version output from bump_version.py" >&2
            exit 1
          fi

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_full=$VERSION_FULL" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(release): v${{ steps.bump.outputs.version_name }} [skip ci]"
          title: "chore(release): v${{ steps.bump.outputs.version_name }}"
          body: |
            Automated `pubspec.yaml` version bump.

            **Merge this pull request** to create the release tag and publish the Android APK on GitHub Releases.
          branch: chore/release-${{ steps.bump.outputs.version_name }}
          delete-branch: true

  publish_release:
    name: Tag, build, publish APK
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.merged == true
      && github.event.pull_request.base.ref == 'main'
      && contains(github.event.pull_request.title, 'chore(release):')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Parse version from pubspec.yaml
        id: ver
        run: |
          set -euo pipefail
          LINE="$(grep -E '^version:[[:space:]]*' pubspec.yaml | head -n1)"
          FULL="${LINE#version:}"
          FULL="$(echo "$FULL" | tr -d '[:space:]')"
          NAME="${FULL%%+*}"
          BUILD="${FULL##*+}"
          echo "version_full=$FULL" >> "$GITHUB_OUTPUT"
          echo "version_name=$NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Tag release
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.ver.outputs.version_name }}"
          git push origin "v${{ steps.ver.outputs.version_name }}"

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name "${{ steps.ver.outputs.version_name }}" \
            --build-number "${{ steps.ver.outputs.build_number }}"

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version_name }}
          name: v${{ steps.ver.outputs.version_name }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/app-release.apk
