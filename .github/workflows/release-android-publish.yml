name: Release (Android) — tag, APK, GitHub Release

# Runs when a PR **into `main`** is **merged**. Only release branches (`release/v*`)
# trigger tag + build + publish — not feat/fix PRs.
#
# You will see this as a **separate** workflow run from "version bump PR" (push).
# Open Actions → this workflow name → run triggered by `pull_request` when you merge the release PR.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-android-publish-main
  cancel-in-progress: false

jobs:
  publish_release:
    name: Tag, build, publish APK
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged == true
      && github.event.pull_request.base.ref == 'main'
      && startsWith(github.event.pull_request.head.ref, 'release/')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Parse version from pubspec.yaml
        id: ver
        run: |
          set -euo pipefail
          LINE="$(grep -E '^version:[[:space:]]*' pubspec.yaml | head -n1)"
          FULL="${LINE#version:}"
          FULL="$(echo "$FULL" | tr -d '[:space:]')"
          NAME="${FULL%%+*}"
          BUILD="${FULL##*+}"
          echo "version_full=$FULL" >> "$GITHUB_OUTPUT"
          echo "version_name=$NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Tag release
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TAG="v${{ steps.ver.outputs.version_name }}"
          HEAD="$(git rev-parse HEAD)"

          git fetch origin --tags --quiet 2>/dev/null || true

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            EXISTING="$(git rev-parse "$TAG^{commit}")"
            if [ "$EXISTING" != "$HEAD" ]; then
              echo "Tag $TAG already exists at $EXISTING but this release is at $HEAD; refuse to move tags." >&2
              exit 1
            fi
            echo "Tag $TAG already points at current commit; skipping tag create/push."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name "${{ steps.ver.outputs.version_name }}" \
            --build-number "${{ steps.ver.outputs.build_number }}"

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.ver.outputs.version_name }}
          name: v${{ steps.ver.outputs.version_name }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/app-release.apk
